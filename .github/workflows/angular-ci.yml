name: Angular CI (Week 6)

# Hands-On 11 (DevOps & CI/CD): build + test the Angular app automatically
# on every push/PR to main, using the same Karma+ChromeHeadless setup as local dev.
on:
  push:
    branches: [main]
    paths:
      - 'Week6-Angular-GitCICD/StudentApp/**'
      - '.github/workflows/angular-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Week6-Angular-GitCICD/StudentApp/**'

defaults:
  run:
    working-directory: Week6-Angular-GitCICD/StudentApp

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Week6-Angular-GitCICD/StudentApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Run unit tests (Karma + ChromeHeadless)
        run: npx ng test --watch=false
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build production bundle
        run: npx ng build --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-course-portal-dist
          path: Week6-Angular-GitCICD/StudentApp/dist/student-course-portal
