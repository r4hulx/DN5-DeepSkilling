<div class="card">

    <div class="card-header bg-dark text-white">
        <h3>Add Student</h3>
    </div>

    <div class="card-body">

        <form [formGroup]="studentForm" (ngSubmit)="saveStudent()">

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       class="form-control"
                       formControlName="name">
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number"
                       class="form-control"
                       formControlName="age">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text"
                       class="form-control"
                       formControlName="department">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       class="form-control"
                       formControlName="email">
            </div>

            <button class="btn btn-success">
                Save Student
            </button>

        </form>

    </div>

</div>
