<div class="card">

<div class="card-header bg-primary text-white">

<h3>Edit Student</h3>

</div>

<div class="card-body">

<form [formGroup]="studentForm" (ngSubmit)="updateStudent()">

<div class="mb-3">

<label>Name</label>

<input
class="form-control"
formControlName="name">

</div>

<div class="mb-3">

<label>Age</label>

<input
type="number"
class="form-control"
formControlName="age">

</div>

<div class="mb-3">

<label>Department</label>

<input
class="form-control"
formControlName="department">

</div>

<div class="mb-3">

<label>Email</label>

<input
class="form-control"
formControlName="email">

</div>

<button class="btn btn-primary">

Update Student

</button>

</form>

</div>

</div>
