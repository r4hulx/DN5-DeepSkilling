<section class="enrollment-form">
  <h2>Enrollment Request (Template-Driven)</h2>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    <label>
      Student name
      <input name="studentName" [(ngModel)]="studentName" #nameCtrl="ngModel" required minlength="3" />
    </label>
    <div class="error" *ngIf="nameCtrl.touched && nameCtrl.invalid">
      <span *ngIf="nameCtrl.errors?.['required']">Name is required.</span>
      <span *ngIf="nameCtrl.errors?.['minlength']">Name must be at least 3 characters.</span>
    </div>

    <label>
      Email
      <input name="studentEmail" [(ngModel)]="studentEmail" #emailCtrl="ngModel" required email />
    </label>
    <div class="error" *ngIf="emailCtrl.touched && emailCtrl.invalid">
      <span *ngIf="emailCtrl.errors?.['required']">Email is required.</span>
      <span *ngIf="emailCtrl.errors?.['email']">Enter a valid email address.</span>
    </div>

    <label>
      Course ID
      <input type="number" name="courseId" [(ngModel)]="courseId" required />
    </label>

    <label>
      Preferred semester
      <select name="preferredSemester" [(ngModel)]="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </label>

    <label class="checkbox">
      <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms" required />
      I agree to the terms
    </label>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="enrollForm.resetForm()">Reset</button>
    </div>
  </form>

  <p class="success" *ngIf="submitted">Enrollment request submitted successfully!</p>
</section>
