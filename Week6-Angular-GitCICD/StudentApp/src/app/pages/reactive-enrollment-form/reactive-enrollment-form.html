<section class="reactive-form">
  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <h2>Enrollment Request (Reactive)</h2>

    <label>
      Student name
      <input formControlName="studentName" />
    </label>
    <div class="error" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.invalid">
      Name is required and must be at least 3 characters.
    </div>

    <label>
      Email
      <input formControlName="studentEmail" />
    </label>
    <div class="error" *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
      This email is already taken.
    </div>

    <label>
      Course ID
      <input formControlName="courseId" />
    </label>
    <div class="error" *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
      Course code starting with XX is not allowed.
    </div>

    <label>
      Preferred semester
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </label>

    <label class="checkbox">
      <input type="checkbox" formControlName="agreeToTerms" />
      I agree to the terms
    </label>

    <fieldset formArrayName="additionalCourses">
      <legend>Additional Courses</legend>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="additional-row">
        <input [formControlName]="i" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
      <button type="button" (click)="addCourse()">Add Another Course</button>
    </fieldset>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    </div>
  </form>

  <p class="success" *ngIf="submitted">Enrollment request submitted successfully!</p>
</section>
