<section class="dashboard">
  <h1>{{ portalName }}</h1>
  <p>Welcome back! Here's a snapshot of your academic progress.</p>

  <div class="stats-row">
    <div class="stat"><strong>{{ coursesAvailable }}</strong><span>Courses Available</span></div>
    <div class="stat"><strong>{{ enrolledCount }}</strong><span>Enrolled</span></div>
    <div class="stat"><strong>{{ gpa }}</strong><span>GPA</span></div>
  </div>

  <!-- [disabled] is one-way property binding: component -> DOM only. -->
  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p *ngIf="message">{{ message }}</p>

  <!-- [(ngModel)] is two-way binding: DOM <-> component, unlike plain [property]. -->
  <label>
    Search courses:
    <input [(ngModel)]="searchTerm" name="searchTerm" placeholder="e.g. Angular" />
  </label>
  <p>Searching for: {{ searchTerm }}</p>
</section>
